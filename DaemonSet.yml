apiVersion: apps/v1
kind: DaemonSet

metadata:
  name: calculator-app-deployment
  labels:
    app: calculator-app


  selector:
    matchLabels:
      app: calculator-app

  template:
    metadata:
      labels:
        app: calculator-app

    spec:
      containers:
      - name: calculator-app
        image: simplebyte/simplybyte-calculator:3.0
        ports:
        - containerPort: 5000
        envFrom:
        - configMapRef:
            name: simplybyte-configmap

---
apiVersion: v1
kind: Service

metadata:
  name: calculator-app-service
  labels:
    app: calculator-app

spec:
  type: NodePort

  selector:
    app: calculator-app

  ports:
  - protocol: TCP
    port: 80
    targetPort: 5000
    nodePort: 30080